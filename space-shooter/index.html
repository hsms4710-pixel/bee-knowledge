<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Shooter - 太空射击游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      border: 2px solid #00ff88;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    }

    canvas {
      display: block;
      background: #000022;
      cursor: none;
    }

    #info-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      max-width: 200px;
    }

    #info-panel h3 {
      color: #00ff88;
      margin-bottom: 10px;
      font-size: 14px;
    }

    #info-panel p {
      margin: 5px 0;
      line-height: 1.4;
    }

    #info-panel .key {
      color: #ffaa00;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>
    <div id="info-panel">
      <h3>操作说明</h3>
      <p><span class="key">← → ↑ ↓</span> 或 <span class="key">W A S D</span> 移动</p>
      <p><span class="key">Space</span> 射击</p>
      <p><span class="key">P / Esc</span> 暂停</p>
      <p><span class="key">Enter</span> 开始/重新开始</p>
    </div>
  </div>

  <script>
    // ==================== 游戏配置 ====================
    const CONFIG = {
      width: 800,
      height: 600,
      fps: 60
    };

    // ==================== 实体类 ====================
    
    // 玩家
    class Player {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 40;
        this.height = 50;
        this.health = 3;
        this.maxHealth = 3;
        this.speed = 300;
        this.weaponLevel = 1;
        this.hasShield = false;
        this.shieldDuration = 0;
        this.isAlive = true;
        this.invincibilityTime = 0;
        this.lastHitTime = 0;
        this.cooldown = 0;
      }

      update(dx, dy, deltaTime, screenWidth, screenHeight) {
        let newX = this.x + dx * this.speed * deltaTime;
        let newY = this.y + dy * this.speed * deltaTime;
        newX = Math.max(this.width / 2, Math.min(screenWidth - this.width / 2, newX));
        newY = Math.max(this.height / 2, Math.min(screenHeight - this.height / 2, newY));
        this.x = newX;
        this.y = newY;

        if (this.cooldown > 0) this.cooldown -= deltaTime;
        if (this.hasShield) {
          this.shieldDuration -= deltaTime;
          if (this.shieldDuration <= 0) this.hasShield = false;
        }
        if (this.invincibilityTime > 0) this.invincibilityTime -= deltaTime;
      }

      shoot() {
        if (this.cooldown > 0) return [];
        this.cooldown = Math.max(0.05, 0.2 - this.weaponLevel * 0.03);
        return this.createBullets();
      }

      createBullets() {
        const bullets = [];
        const y = this.y - this.height / 2;
        switch (this.weaponLevel) {
          case 1:
            bullets.push(new Bullet(this.x, y, 0, -1, 800, 6, 'player', 10));
            break;
          case 2:
            bullets.push(new Bullet(this.x - 8, y, 0, -1, 800, 5, 'player', 15));
            bullets.push(new Bullet(this.x + 8, y, 0, -1, 800, 5, 'player', 15));
            break;
          case 3:
            bullets.push(new Bullet(this.x, y, 0, -1, 800, 4, 'player', 20));
            bullets.push(new Bullet(this.x - 15, y, 0.3, -0.9, 800, 4, 'player', 20));
            bullets.push(new Bullet(this.x + 15, y, -0.3, -0.9, 800, 4, 'player', 20));
            break;
          case 4:
            // 双排三连发
            const row1 = this.createLevel3Bullets();
            const row2 = this.createLevel3Bullets().map(b => ({ ...b, y: y - 10 }));
            bullets.push(...row1, ...row2);
            break;
          case 5:
            for (let i = 0; i < 5; i++) {
              const offset = (i - 2) * 15;
              bullets.push(new Bullet(this.x + offset, y, 0, -1, 900, 4, 'player', 25));
            }
            break;
        }
        return bullets;
      }

      createLevel3Bullets() {
        const y = this.y - this.height / 2;
        return [
          new Bullet(this.x, y, 0, -1, 800, 4, 'player', 20),
          new Bullet(this.x - 15, y, 0.3, -0.9, 800, 4, 'player', 20),
          new Bullet(this.x + 15, y, -0.3, -0.9, 800, 4, 'player', 20)
        ];
      }

      takeDamage(damage) {
        if (this.invincibilityTime > 0 || this.hasShield) return;
        this.health -= damage;
        this.invincibilityTime = 1;
        if (this.health <= 0) {
          this.health = 0;
          this.isAlive = false;
        }
      }

      heal(amount) {
        this.health = Math.min(this.maxHealth, this.health + amount);
      }

      gainShield(duration = 5) {
        this.hasShield = true;
        this.shieldDuration = duration;
      }

      upgradeWeapon() {
        if (this.weaponLevel < 5) this.weaponLevel++;
      }

      getWeaponDamage() {
        return 10 + this.weaponLevel * 5;
      }
    }

    // 子弹
    class Bullet {
      constructor(x, y, vx, vy, speed, size, type, damage = 10) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.speed = speed;
        this.size = size;
        this.type = type;
        this.damage = damage;
      }

      update(deltaTime) {
        this.x += this.vx * this.speed * deltaTime;
        this.y += this.vy * this.speed * deltaTime;
      }

      isOffScreen(width, height) {
        return this.y < -50 || this.y > height + 50;
      }
    }

    // 敌人
    class Enemy {
      constructor(x, y, type, config) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.health = config.health;
        this.maxHealth = config.health;
        this.speed = config.speed;
        this.damage = config.damage;
        this.score = config.score;
        this.width = 30;
        this.height = 30;
        this.isAlive = true;

        switch (type) {
          case 'fast':
            this.movePattern = 'zigzag';
            break;
          case 'shooter':
            this.movePattern = 'sine';
            this.sineOffset = 0;
            this.targetX = x;
            break;
          default:
            this.movePattern = 'straight';
        }
      }

      update(deltaTime) {
        switch (this.movePattern) {
          case 'straight':
            this.y += this.speed * deltaTime;
            break;
          case 'zigzag':
            this.y += this.speed * deltaTime;
            this.x += Math.sin(this.y * 0.1) * 50 * deltaTime;
            break;
          case 'sine':
            this.y += this.speed * deltaTime;
            this.sineOffset += deltaTime * 2;
            this.x = this.targetX + Math.sin(this.sineOffset) * 80;
            break;
        }
        if (this.x < 0) this.x = 0;
        if (this.x > CONFIG.width) this.x = CONFIG.width;
      }

      tryShoot() {
        return this.type === 'shooter';
      }

      performShot() {
        const bullets = [];
        for (let i = -1; i <= 1; i++) {
          bullets.push(new Bullet(this.x + i * 10, this.y + this.height / 2, 0, 1, 300, 5, 'enemy', 10));
        }
        return bullets;
      }

      takeDamage(damage) {
        this.health -= damage;
        if (this.health <= 0) {
          this.health = 0;
          this.isAlive = false;
        }
      }

      isDestroyed() {
        return !this.isAlive;
      }
    }

    // 道具
    class PowerUp {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.vy = 100;
        this.size = 20;
        this.type = type;
      }

      update(deltaTime) {
        this.y += this.vy * deltaTime;
      }

      static random(x, y) {
        const types = ['weapon', 'shield', 'bomb', 'life'];
        return new PowerUp(x, y, types[Math.floor(Math.random() * types.length)]);
      }

      getEffect() {
        switch (this.type) {
          case 'weapon': return { type: 'weapon' };
          case 'shield': return { type: 'shield', duration: 5 };
          case 'bomb': return { type: 'bomb' };
          case 'life': return { type: 'life', value: 1 };
        }
      }
    }

    // Boss
    class Boss {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.width = 100;
        this.height = 100;
        this.health = 300;
        this.maxHealth = 300;
        this.damage = 20;
        this.score = 500;
        this.phase = 1;
        this.isAlive = true;
        this.lastShotTime = 0;
        this.spawnInterval = 2;
      }

      update(deltaTime) {
        this.x += Math.sin(Date.now() / 200) * 50 * deltaTime;
        this.x = Math.max(this.width / 2, Math.min(CONFIG.width - this.width / 2, this.x));

        this.lastShotTime += deltaTime;
        if (this.lastShotTime >= this.spawnInterval) {
          this.lastShotTime = 0;
        }

        this.checkPhaseChange();
      }

      getNewBullets() {
        if (this.lastShotTime >= this.spawnInterval) {
          this.lastShotTime = 0;
          const count = this.phase === 1 ? 5 : this.phase === 2 ? 8 : 12;
          const bullets = [];
          for (let i = 0; i < count; i++) {
            const angle = (Math.PI / 2) + (i - count / 2) * 0.3;
            bullets.push(new Bullet(
              this.x, this.y + this.height / 2,
              Math.cos(angle), Math.sin(angle),
              300, 5, 'enemy', 15
            ));
          }
          return bullets;
        }
        return [];
      }

      takeDamage(damage) {
        this.health -= damage;
        if (this.health <= 0) {
          this.health = 0;
          this.isAlive = false;
        }
      }

      checkPhaseChange() {
        const hp = this.health / this.maxHealth;
        if (hp <= 0.3 && this.phase < 3) {
          this.phase = 3;
          this.spawnInterval = 0.8;
        } else if (hp <= 0.6 && this.phase < 2) {
          this.phase = 2;
          this.spawnInterval = 1.2;
        }
      }

      isDestroyed() {
        return !this.isAlive;
      }
    }

    // ==================== 系统类 ====================

    // 敌机生成器
    class EnemySpawner {
      constructor(width, height) {
        this.width = width;
        this.height = height;
        this.spawnInterval = 1.5;
        this.difficulty = 1;
      }

      setSpawnInterval(interval) {
        this.spawnInterval = Math.max(0.3, interval);
      }

      spawnEnemy(allowedTypes = ['basic']) {
        const type = allowedTypes[Math.floor(Math.random() * allowedTypes.length)];
        const x = Math.random() * (this.width - 40) + 20;
        const baseConfigs = {
          basic: { type: 'basic', health: 1, speed: 100, damage: 1, score: 10 },
          fast: { type: 'fast', health: 1, speed: 250, damage: 1, score: 20 },
          tank: { type: 'tank', health: 3, speed: 50, damage: 2, score: 50 },
          shooter: { type: 'shooter', health: 2, speed: 80, damage: 1, score: 30 }
        };
        const config = { ...baseConfigs[type], health: Math.ceil(baseConfigs[type].health * (1 + this.difficulty * 0.3)), score: Math.ceil(baseConfigs[type].score * (1 + this.difficulty * 0.2)) };
        return new Enemy(x, -30, type, config);
      }

      getEnemyTypes(level) {
        const types = ['basic'];
        if (level >= 1) types.push('fast');
        if (level >= 2) types.push('shooter');
        if (level >= 3) types.push('tank');
        return types;
      }
    }

    // 碰撞系统
    class CollisionSystem {
      checkCircleCollision(c1, c2) {
        const dx = c1.x - c2.x;
        const dy = c1.y - c2.y;
        return Math.sqrt(dx * dx + dy * dy) < c1.radius + c2.radius;
      }

      checkCollision(obj1, obj2) {
        return !(
          obj1.x + obj1.width / 2 < obj2.x - obj2.width / 2 ||
          obj1.x - obj1.width / 2 > obj2.x + obj2.width / 2 ||
          obj1.y + obj1.height / 2 < obj2.y - obj2.height / 2 ||
          obj1.y - obj1.height / 2 > obj2.y + obj2.height / 2
        );
      }
    }

    // 道具系统
    class PowerUpSystem {
      constructor() {
        this.dropRate = 0.3;
      }

      tryDropPowerUp(enemy) {
        if (Math.random() < this.dropRate) {
          return PowerUp.random(enemy.x, enemy.y);
        }
        return null;
      }

      collectPowerUp(player, powerUp) {
        const effect = powerUp.getEffect();
        switch (effect.type) {
          case 'weapon': player.upgradeWeapon(); break;
          case 'shield': player.gainShield(effect.duration || 5); break;
          case 'bomb': console.log('炸弹!'); break;
          case 'life': player.heal(effect.value || 1); break;
        }
      }
    }

    // 关卡
    class Level {
      constructor(index) {
        this.index = index;
        this.enemyWave = 0;
        this.bossTriggered = false;
      }

      getSpawnInterval() {
        return Math.max(0.5, 1.5 - this.index * 0.2);
      }

      getEnemyTypes() {
        const types = ['basic'];
        if (this.index >= 1) types.push('fast');
        if (this.index >= 2) types.push('shooter');
        if (this.index >= 3) types.push('tank');
        return types;
      }

      shouldSpawnBoss(count) {
        if (this.enemyWave >= 20 && !this.bossTriggered) {
          this.bossTriggered = true;
          return true;
        }
        return false;
      }

      recordEnemyKill() {
        this.enemyWave++;
      }
    }

    // ==================== 渲染器 ====================
    class Renderer {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.stars = [];
        for (let i = 0; i < 100; i++) {
          this.stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5 + 0.5,
            speed: Math.random() * 2 + 1
          });
        }
      }

      clear() {
        this.ctx.fillStyle = '#000022';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
      }

      drawStars() {
        for (const star of this.stars) {
          star.y += star.speed;
          if (star.y > this.canvas.height) {
            star.y = 0;
            star.x = Math.random() * this.canvas.width;
          }
          this.ctx.fillStyle = '#ffffff';
          this.ctx.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      drawPlayer(player) {
        const { x, y, width, height, weaponLevel, hasShield } = player;
        if (hasShield) {
          this.ctx.strokeStyle = 'rgba(100, 200, 255, 0.5)';
          this.ctx.lineWidth = 3;
          this.ctx.beginPath();
          this.ctx.arc(x, y, width / 2 + 10, 0, Math.PI * 2);
          this.ctx.stroke();
        }
        this.ctx.fillStyle = '#00ff88';
        this.ctx.beginPath();
        this.ctx.moveTo(x, y - height / 2);
        this.ctx.lineTo(x + width / 2, y);
        this.ctx.lineTo(x, y + height / 2 - 10);
        this.ctx.lineTo(x - width / 2, y);
        this.ctx.closePath();
        this.ctx.fill();

        const gradient = this.ctx.createLinearGradient(0, y + height / 2, 0, y + height / 2 + 15);
        gradient.addColorStop(0, '#ff6600');
        gradient.addColorStop(1, '#ff0000');
        this.ctx.fillStyle = gradient;
        this.ctx.beginPath();
        this.ctx.moveTo(x - 5, y + height / 2 - 5);
        this.ctx.lineTo(x, y + height / 2 + 15);
        this.ctx.lineTo(x + 5, y + height / 2 - 5);
        this.ctx.closePath();
        this.ctx.fill();

        if (weaponLevel > 1) {
          this.ctx.fillStyle = '#ffff00';
          this.ctx.font = 'bold 12px Arial';
          this.ctx.textAlign = 'center';
          this.ctx.fillText(`LV${weaponLevel}`, x, y - height / 2 - 5);
        }
      }

      drawEnemy(enemy) {
        const { x, y, width, height, type, health, maxHealth } = enemy;
        const colors = { basic: '#ff6600', fast: '#ff3366', tank: '#cc0000', shooter: '#ff9900' };
        this.ctx.fillStyle = colors[type] || '#ff6600';
        this.ctx.beginPath();
        this.ctx.arc(x, y, width / 2, 0, Math.PI * 2);
        this.ctx.fill();

        this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
        this.ctx.beginPath();
        this.ctx.arc(x, y, width / 2 - 4, 0, Math.PI * 2);
        this.ctx.fill();

        const hp = health / maxHealth;
        this.ctx.fillStyle = '#333333';
        this.ctx.fillRect(x - width / 2 - 3, y - height / 2 - 8, width + 6, 4);
        this.ctx.fillStyle = hp > 0.5 ? '#00ff00' : hp > 0.25 ? '#ffaa00' : '#ff0000';
        this.ctx.fillRect(x - width / 2 - 3, y - height / 2 - 8, (width + 6) * hp, 4);
      }

      drawBoss(boss) {
        const { x, y, width, height, health, maxHealth, phase } = boss;
        this.ctx.fillStyle = '#9900ff';
        this.ctx.beginPath();
        this.ctx.arc(x, y, width / 2, 0, Math.PI * 2);
        this.ctx.fill();

        this.ctx.strokeStyle = '#ff66ff';
        this.ctx.lineWidth = 3;
        this.ctx.beginPath();
        this.ctx.arc(x, y, width / 2 + 5, 0, Math.PI * 2);
        this.ctx.stroke();

        this.ctx.fillStyle = '#ff00ff';
        this.ctx.beginPath();
        this.ctx.arc(x, y, width / 2 - 10, 0, Math.PI * 2 * phase);
        this.ctx.fill();

        const hp = health / maxHealth;
        const barWidth = 200;
        const barHeight = 10;
        const barX = (CONFIG.width - barWidth) / 2;
        const barY = 20;

        this.ctx.fillStyle = '#333333';
        this.ctx.fillRect(barX, barY, barWidth, barHeight);
        this.ctx.fillStyle = hp > 0.5 ? '#00ff00' : hp > 0.25 ? '#ffaa00' : '#ff0000';
        this.ctx.fillRect(barX, barY, barWidth * hp, barHeight);

        this.ctx.fillStyle = '#ff66ff';
        this.ctx.font = 'bold 14px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.fillText(`BOSS PHASE ${phase}`, CONFIG.width / 2, barY - 5);
      }

      drawBullet(bullet) {
        const { x, y, size, type } = bullet;
        if (type === 'player') {
          const gradient = this.ctx.createRadialGradient(x - size / 2, y - size / 2, 0, x, y, size);
          gradient.addColorStop(0, '#00ff88');
          gradient.addColorStop(1, '#00aa66');
          this.ctx.fillStyle = gradient;
        } else {
          this.ctx.fillStyle = '#ff4444';
        }
        this.ctx.beginPath();
        this.ctx.arc(x, y, size, 0, Math.PI * 2);
        this.ctx.fill();
      }

      drawPowerUp(powerUp) {
        const { x, y, size, type } = powerUp;
        const colors = { weapon: '#ffff00', shield: '#00bfff', bomb: '#ff4444', life: '#ff69b4' };
        this.ctx.fillStyle = colors[type] || '#ffffff';
        this.ctx.beginPath();
        this.ctx.arc(x, y, size / 2, 0, Math.PI * 2);
        this.ctx.fill();

        this.ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        this.ctx.lineWidth = 2;
        this.ctx.beginPath();
        this.ctx.arc(x, y, size / 2 + 4, 0, Math.PI * 2);
        this.ctx.stroke();

        this.ctx.fillStyle = '#ffffff';
        this.ctx.font = 'bold 14px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        const symbols = { weapon: 'W', shield: 'S', bomb: 'B', life: '+' };
        this.ctx.fillText(symbols[type] || '?', x, y);
      }

      drawPaused() {
        this.ctx.fillStyle = 'rgba(0,0,0,0.7)';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.fillStyle = '#ffffff';
        this.ctx.font = 'bold 48px Arial';
        this.ctx.textAlign = 'center';
        this.ctx.fillText('暂停', this.canvas.width / 2, this.canvas.height / 2);
        this.ctx.font = '18px Arial';
        this.ctx.fillText('按 P 或 ESC 继续', this.canvas.width / 2, this.canvas.height / 2 + 40);
      }
    }

    // ==================== HUD ====================
    class HUD {
      constructor(width, height) {
        this.width = width;
        this.height = height;
      }

      render(ctx, player, score, highScore) {
        this.drawHealth(ctx, player);
        this.drawWeaponLevel(ctx, player);
        this.drawShieldStatus(ctx, player);
        this.drawScore(ctx, score, highScore);
      }

      drawHealth(ctx, player) {
        for (let i = 0; i < player.maxHealth; i++) {
          const x = 10 + i * 25;
          const y = 10;
          ctx.fillStyle = i < player.health ? '#ff4444' : '#555555';
          ctx.beginPath();
          ctx.moveTo(x, y + 10);
          ctx.bezierCurveTo(x - 10, y, x - 10, y - 10, x, y - 10);
          ctx.bezierCurveTo(x + 10, y - 10, x + 10, y, x, y + 10);
          ctx.closePath();
          ctx.fill();
        }
      }

      drawWeaponLevel(ctx, player) {
        ctx.fillStyle = '#ffffff';
        ctx.font = '14px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`武器等级: ${player.weaponLevel}`, 10, 60);
      }

      drawShieldStatus(ctx, player) {
        if (player.hasShield) {
          ctx.fillStyle = '#00bfff';
          ctx.font = '14px Arial';
          ctx.textAlign = 'left';
          ctx.fillText('护盾激活!', 10, 80);
        }
      }

      drawScore(ctx, score, highScore) {
        const x = this.width - 10;
        const y = 20;
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'right';
        ctx.fillText(`分数: ${score}`, x, y);
        if (highScore > 0) {
          ctx.fillStyle = '#ffaa00';
          ctx.font = '12px Arial';
          ctx.fillText(`最高: ${highScore}`, x, y + 20);
        }
      }
    }

    // ==================== 菜单 ====================
    class Menu {
      constructor(width, height) {
        this.width = width;
        this.height = height;
      }

      render(ctx, onStart) {
        this.drawBackground(ctx);
        this.drawTitle(ctx);
        this.drawOptions(ctx, onStart);
      }

      drawBackground(ctx) {
        const gradient = ctx.createLinearGradient(0, 0, 0, this.height);
        gradient.addColorStop(0, '#0a0a2e');
        gradient.addColorStop(1, '#000022');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, this.width, this.height);

        for (let i = 0; i < 50; i++) {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(Math.random() * this.width, Math.random() * this.height, 1, 1);
        }
      }

      drawTitle(ctx) {
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE SHOOTER', this.width / 2, this.height / 2 - 100);
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px Arial';
        ctx.fillText('太空射击游戏', this.width / 2, this.height / 2 - 50);
      }

      drawOptions(ctx, onStart) {
        const x = this.width / 2;
        const y = this.height / 2;
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('> 开始游戏', x, y);
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '14px Arial';
        ctx.fillText('方向键 / WASD 移动，空格键射击', x, y + 80);
        ctx.fillText('按 ENTER 开始游戏', x, y + 100);
      }
    }

    // ==================== 游戏引擎 ====================
    class GameEngine {
      constructor(canvas) {
        this.canvas = canvas;
        this.renderer = new Renderer(canvas);
        this.hud = new HUD(CONFIG.width, CONFIG.height);
        this.menu = new Menu(CONFIG.width, CONFIG.height);
        this.enemySpawner = new EnemySpawner(CONFIG.width, CONFIG.height);
        this.collisionSystem = new CollisionSystem();
        this.powerUpSystem = new PowerUpSystem();

        this.state = 'menu';
        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('spaceShooterHighScore') || '0', 10);
        this.keys = new Set();
        this.enemies = [];
        this.bullets = [];
        this.powerUps = [];
        this.bosses = [];
        this.spawnTimer = 0;
        this.currentLevel = null;
        this.levelIndex = 0;

        this.setupInput();
      }

      setupInput() {
        window.addEventListener('keydown', (e) => {
          this.keys.add(e.key.toLowerCase());
          if (e.key === 'p' || e.key === 'Escape') {
            if (this.state === 'playing') this.state = 'paused';
            else if (this.state === 'paused') this.state = 'playing';
          }
          if (e.key === 'Enter') {
            if (this.state === 'menu' || this.state === 'gameover') {
              this.startNewGame();
            }
          }
        });

        window.addEventListener('keyup', (e) => {
          this.keys.delete(e.key.toLowerCase());
        });

        window.addEventListener('keydown', (e) => {
          if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
            e.preventDefault();
          }
        }, { passive: false });
      }

      startNewGame() {
        this.state = 'playing';
        this.score = 0;
        this.spawnTimer = 0;
        this.enemies = [];
        this.bullets = [];
        this.powerUps = [];
        this.bosses = [];

        this.player = new Player(CONFIG.width / 2, CONFIG.height - 100);
        this.currentLevel = new Level(0);
        this.levelIndex = 0;
        this.enemySpawner.setSpawnInterval(this.currentLevel.getSpawnInterval());

        this.lastTime = performance.now();
      }

      gameLoop = () => {
        const currentTime = performance.now();
        const deltaTime = (currentTime - this.lastTime) / 1000;
        this.lastTime = currentTime;

        if (this.state === 'playing') {
          this.update(deltaTime);
        }

        this.render();
        requestAnimationFrame(this.gameLoop);
      };

      update(deltaTime) {
        if (this.player) {
          let dx = 0, dy = 0;
          if (this.keys.has('arrowleft') || this.keys.has('a')) dx -= 1;
          if (this.keys.has('arrowright') || this.keys.has('d')) dx += 1;
          if (this.keys.has('arrowup') || this.keys.has('w')) dy -= 1;
          if (this.keys.has('arrowdown') || this.keys.has('s')) dy += 1;

          if (this.keys.has(' ')) {
            const bullets = this.player.shoot();
            this.bullets.push(...bullets);
          }

          this.player.update(dx, dy, deltaTime, CONFIG.width, CONFIG.height);
        }

        // 更新敌人
        for (let i = this.enemies.length - 1; i >= 0; i--) {
          this.enemies[i].update(deltaTime);
          if (this.enemies[i].y > CONFIG.height + 50) {
            this.enemies.splice(i, 1);
          } else if (this.enemies[i].tryShoot()) {
            this.bullets.push(...this.enemies[i].performShot());
          }
        }

        // 更新子弹
        for (let i = this.bullets.length - 1; i >= 0; i--) {
          this.bullets[i].update(deltaTime);
          if (this.bullets[i].isOffScreen(CONFIG.width, CONFIG.height)) {
            this.bullets.splice(i, 1);
          }
        }

        // 更新道具
        for (let i = this.powerUps.length - 1; i >= 0; i--) {
          this.powerUps[i].update(deltaTime);
          if (this.powerUps[i].y > CONFIG.height + 50) {
            this.powerUps.splice(i, 1);
          }
        }

        // 更新 Boss
        for (const boss of this.bosses) {
          boss.update(deltaTime);
          this.bullets.push(...boss.getNewBullets());
        }

        // 生成敌人
        this.spawnTimer += deltaTime;
        if (this.spawnTimer >= this.enemySpawner.getSpawnInterval()) {
          this.spawnTimer = 0;
          const enemy = this.enemySpawner.spawnEnemy(this.currentLevel.getEnemyTypes());
          this.enemies.push(enemy);
        }

        // 碰撞检测
        this.checkCollisions();

        // 检查 Boss 生成
        if (this.currentLevel.shouldSpawnBoss(this.enemies.length + this.score / 10)) {
          this.bosses.push(new Boss(CONFIG.width / 2, -50));
        }

        // 更新 HUD
        if (this.player) {
          this.hud.render(this.renderer.ctx, this.player, this.score, this.highScore);
        }
      }

      checkCollisions() {
        if (!this.player) return;

        // 玩家子弹 vs 敌人
        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const bullet = this.bullets[i];
          if (bullet.type !== 'player') continue;

          for (let j = this.enemies.length - 1; j >= 0; j--) {
            const enemy = this.enemies[j];
            if (this.collisionSystem.checkCircleCollision(
              { x: bullet.x, y: bullet.y, radius: bullet.size / 2 },
              { x: enemy.x, y: enemy.y, radius: enemy.width / 2 }
            )) {
              enemy.takeDamage(this.player.getWeaponDamage());
              this.bullets.splice(i, 1);
              if (enemy.isDestroyed()) {
                this.enemies.splice(j, 1);
                this.score += enemy.score;
                const powerUp = this.powerUpSystem.tryDropPowerUp(enemy);
                if (powerUp) this.powerUps.push(powerUp);
                this.currentLevel.recordEnemyKill();
              }
              return;
            }
          }
        }

        // 玩家 vs 敌人子弹
        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const bullet = this.bullets[i];
          if (bullet.type === 'player') continue;

          if (this.collisionSystem.checkCollision(
            { x: this.player.x, y: this.player.y, width: this.player.width * 0.7, height: this.player.height * 0.7 },
            { x: bullet.x, y: bullet.y, width: bullet.size * 2, height: bullet.size * 2 }
          )) {
            this.player.takeDamage(bullet.damage);
            this.bullets.splice(i, 1);
            if (!this.player.isAlive) {
              this.gameOver();
            }
            return;
          }
        }

        // 玩家 vs 敌人
        for (const enemy of this.enemies) {
          if (this.collisionSystem.checkCollision(
            { x: this.player.x, y: this.player.y, width: this.player.width * 0.7, height: this.player.height * 0.7 },
            { x: enemy.x, y: enemy.y, width: enemy.width, height: enemy.height }
          )) {
            this.player.takeDamage(enemy.damage);
            enemy.takeDamage(this.player.getWeaponDamage());
            if (!this.player.isAlive) this.gameOver();
            if (enemy.isDestroyed()) {
              this.enemies = this.enemies.filter(e => e !== enemy);
              this.score += enemy.score;
            }
            return;
          }
        }

        // 玩家 vs 道具
        for (let i = this.powerUps.length - 1; i >= 0; i--) {
          const powerUp = this.powerUps[i];
          if (this.collisionSystem.checkCircleCollision(
            { x: this.player.x, y: this.player.y, radius: this.player.width / 2 },
            { x: powerUp.x, y: powerUp.y, radius: powerUp.size / 2 }
          )) {
            this.powerUpSystem.collectPowerUp(this.player, powerUp);
            this.powerUps.splice(i, 1);
          }
        }

        // 玩家子弹 vs Boss
        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const bullet = this.bullets[i];
          if (bullet.type !== 'player') continue;

          for (let j = this.bosses.length - 1; j >= 0; j--) {
            const boss = this.bosses[j];
            if (this.collisionSystem.checkCircleCollision(
              { x: bullet.x, y: bullet.y, radius: bullet.size / 2 },
              { x: boss.x, y: boss.y, radius: boss.width / 2 }
            )) {
              boss.takeDamage(this.player.getWeaponDamage());
              this.bullets.splice(i, 1);
              if (boss.isDestroyed()) {
                this.bosses.splice(j, 1);
                this.score += boss.score;
                if (this.levelIndex < 4) {
                  setTimeout(() => {
                    this.levelIndex++;
                    this.currentLevel = new Level(this.levelIndex);
                    this.enemySpawner.setSpawnInterval(this.currentLevel.getSpawnInterval());
                  }, 2000);
                } else {
                  this.gameOver(true);
                }
              }
              return;
            }
          }
        }

        // 玩家 vs Boss 子弹
        for (let i = this.bullets.length - 1; i >= 0; i--) {
          const bullet = this.bullets[i];
          if (bullet.type === 'player') continue;

          if (this.collisionSystem.checkCollision(
            { x: this.player.x, y: this.player.y, width: this.player.width * 0.7, height: this.player.height * 0.7 },
            { x: bullet.x, y: bullet.y, width: bullet.size * 2, height: bullet.size * 2 }
          )) {
            this.player.takeDamage(bullet.damage);
            this.bullets.splice(i, 1);
            if (!this.player.isAlive) this.gameOver();
            return;
          }
        }
      }

      gameOver(won = false) {
        this.state = 'gameover';
        if (this.score > this.highScore) {
          this.highScore = this.score;
          localStorage.setItem('spaceShooterHighScore', this.highScore.toString());
        }
        if (won) {
          this.menu.drawTitle(this.renderer.ctx);
          this.renderer.ctx.fillStyle = '#00ff88';
          this.renderer.ctx.font = 'bold 32px Arial';
          this.renderer.ctx.textAlign = 'center';
          this.renderer.ctx.fillText('恭喜通关！', CONFIG.width / 2, CONFIG.height / 2);
        }
      }

      render() {
        this.renderer.clear();
        this.renderer.drawStars();

        if (this.state === 'playing' || this.state === 'paused') {
          for (const enemy of this.enemies) {
            this.renderer.drawEnemy(enemy);
          }
          for (const boss of this.bosses) {
            this.renderer.drawBoss(boss);
          }
          for (const bullet of this.bullets) {
            this.renderer.drawBullet(bullet);
          }
          for (const powerUp of this.powerUps) {
            this.renderer.drawPowerUp(powerUp);
          }
          if (this.player) {
            this.renderer.drawPlayer(this.player);
          }
          this.hud.render(this.renderer.ctx, this.player, this.score, this.highScore);
          this.renderer.ctx.fillStyle = '#ffffff';
          this.renderer.ctx.font = '14px Arial';
          this.renderer.ctx.textAlign = 'left';
          this.renderer.ctx.fillText(`关卡 ${this.levelIndex + 1}`, 10, 40);
        }

        if (this.state === 'menu' || this.state === 'gameover') {
          this.menu.render(this.renderer.ctx, this.startNewGame.bind(this));
        }

        if (this.state === 'paused') {
          this.renderer.drawPaused();
        }
      }
    }

    // ==================== 启动游戏 ====================
    const canvas = document.getElementById('game-canvas');
    const game = new GameEngine(canvas);
    game.startNewGame();
    game.gameLoop();
  </script>
</body>
