<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塔防游戏 - Tower Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100%;
      height: 100vh;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    
    canvas {
      display: block;
      background: #16213e;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }
    
    .info-panel {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      max-width: 200px;
    }
    
    .info-panel h3 {
      margin-bottom: 10px;
      color: #FFD700;
    }
    
    .info-panel p {
      margin: 5px 0;
      line-height: 1.4;
    }
    
    .info-panel .key {
      color: #4FC3F7;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1000" height="600"></canvas>
  
  <div class="info-panel">
    <h3>操作说明</h3>
    <p><span class="key">箭塔</span>: 100 金币 - 近距离快速攻击</p>
    <p><span class="key">魔法塔</span>: 150 金币 - AOE 范围伤害</p>
    <p><span class="key">炮塔</span>: 200 金币 - 高伤害低攻速</p>
    <p><span class="key">空格</span>: 暂停/继续</p>
    <p><span class="key">R</span>: 重新开始</p>
  </div>

  <script>
    // ==================== 敌人类 ====================
    class Enemy {
      constructor(config, startX, startY) {
        this.id = 'enemy_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        this.x = startX;
        this.y = startY;
        this.health = config.health;
        this.maxHealth = config.health;
        this.speed = config.speed;
        this.goldReward = config.goldReward;
        this.color = config.color;
        this.size = config.size;
        this.canFly = config.canFly || false;
        this.isAlive = true;
        this.reachedEnd = false;
        this.pathIndex = 0;
      }
      
      takeDamage(damage) {
        this.health -= damage;
        if (this.health <= 0) {
          this.health = 0;
          this.isAlive = false;
        }
      }
      
      update(path) {
        if (!this.isAlive) return;
        
        const waypoints = path.getWaypoints();
        const target = waypoints[this.pathIndex];
        const nextTarget = waypoints[this.pathIndex + 1];
        
        if (!nextTarget) {
          this.reachedEnd = true;
          return;
        }
        
        const dx = nextTarget.x - this.x;
        const dy = nextTarget.y - this.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist <= this.speed) {
          this.x = nextTarget.x;
          this.y = nextTarget.y;
          this.pathIndex++;
        } else {
          this.x += (dx / dist) * this.speed;
          this.y += (dy / dist) * this.speed;
        }
      }
      
      draw(ctx) {
        // 血条
        const barWidth = this.size * 2;
        const barHeight = 4;
        const barX = this.x - barWidth / 2;
        const barY = this.y - this.size - 10;
        
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barWidth, barHeight);
        
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(barX, barY, barWidth * (this.health / this.maxHealth), barHeight);
        
        // 敌人身体
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        
        // 边框
        ctx.strokeStyle = '#FFF';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
    
    // ==================== 防御塔类 ====================
    class Tower {
      constructor(config, x, y) {
        this.id = 'tower_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        this.x = x;
        this.y = y;
        this.level = 1;
        this.cooldown = 0;
        this.config = config;
      }
      
      getStats() {
        return {
          damage: this.config.damage * (1 + (this.level - 1) * 0.2),
          range: this.config.range * (1 + (this.level - 1) * 0.1),
          rate: this.config.rate * (1 - (this.level - 1) * 0.1),
        };
      }
      
      findTarget(enemies) {
        let closest = null;
        let closestDist = this.getStats().range;
        
        for (const enemy of enemies) {
          if (!enemy.isAlive) continue;
          
          const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
          if (dist < closestDist) {
            closestDist = dist;
            closest = enemy;
          }
        }
        
        return closest;
      }
      
      update(deltaTime, enemies) {
        this.cooldown -= deltaTime;
        
        if (this.cooldown <= 0) {
          const target = this.findTarget(enemies);
          if (target) {
            this.attack(target);
            this.cooldown = 1 / this.getStats().rate;
          }
        }
      }
    }
    
    class ArrowTower extends Tower {
      constructor(x, y) {
        super({
          id: 'arrow_tower',
          name: '箭塔',
          cost: 100,
          damage: 10,
          range: 150,
          rate: 1,
          color: '#4CAF50',
        }, x, y);
        this.bullets = [];
      }
      
      attack(target) {
        this.bullets.push(new Bullet(this.x, this.y, target.x, target.y, this.getStats().damage, '#8BC34A'));
      }
      
      update(deltaTime, enemies) {
        super.update(deltaTime, enemies);
        
        const activeBullets = [];
        for (const bullet of this.bullets) {
          if (bullet.update(deltaTime, enemies)) {
            // 命中
          } else if (bullet.isActive) {
            activeBullets.push(bullet);
          }
        }
        this.bullets = activeBullets;
      }
      
      draw(ctx) {
        const stats = this.getStats();
        
        // 底座
        ctx.fillStyle = this.config.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 25, 0, Math.PI * 2);
        ctx.fill();
        
        // 塔身
        ctx.fillStyle = '#388E3C';
        ctx.beginPath();
        ctx.arc(this.x, this.y, 18, 0, Math.PI * 2);
        ctx.fill();
        
        // 等级
        ctx.fillStyle = '#FFF';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Lv' + this.level, this.x, this.y + 35);
        
        // 范围
        ctx.strokeStyle = 'rgba(76, 175, 80, 0.2)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, stats.range, 0, Math.PI * 2);
        ctx.stroke();
        
        // 子弹
        for (const bullet of this.bullets) {
          bullet.draw(ctx);
        }
      }
    }
    
    class MagicTower extends Tower {
      constructor(x, y) {
        super({
          id: 'magic_tower',
          name: '魔法塔',
          cost: 150,
          damage: 25,
          range: 120,
          rate: 2,
          color: '#9C27B0',
        }, x, y);
        this.lastTarget = null;
      }
      
      findTarget(enemies) {
        if (this.lastTarget && this.lastTarget.isAlive) {
          const dist = Math.hypot(this.lastTarget.x - this.x, this.lastTarget.y - this.y);
          if (dist <= this.getStats().range) {
            return this.lastTarget;
          }
        }
        
        let closest = null;
        let closestDist = this.getStats().range;
        
        for (const enemy of enemies) {
          if (!enemy.isAlive) continue;
          
          const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
          if (dist < closestDist) {
            closestDist = dist;
            closest = enemy;
          }
        }
        
        this.lastTarget = closest;
        return closest;
      }
      
      attack(target) {
        target.takeDamage(this.getStats().damage);
        
        // AOE
        for (const enemy of game.enemies) {
          if (!enemy.isAlive || enemy === target) continue;
          
          const dist = Math.hypot(enemy.x - target.x, enemy.y - target.y);
          if (dist < 50) {
            enemy.takeDamage(this.getStats().damage * 0.5);
          }
        }
      }
      
      update(deltaTime, enemies) {
        super.update(deltaTime, enemies);
        if (this.lastTarget && !this.lastTarget.isAlive) {
          this.lastTarget = null;
        }
      }
      
      draw(ctx) {
        const stats = this.getStats();
        
        // 光环
        ctx.strokeStyle = 'rgba(156, 39, 176, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, stats.range, 0, Math.PI * 2);
        ctx.stroke();
        
        // 底座
        ctx.fillStyle = this.config.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 22, 0, Math.PI * 2);
        ctx.fill();
        
        // 塔身
        ctx.fillStyle = '#7B1FA2';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 18);
        ctx.lineTo(this.x + 12, this.y);
        ctx.lineTo(this.x, this.y + 18);
        ctx.lineTo(this.x - 12, this.y);
        ctx.closePath();
        ctx.fill();
        
        // 宝石
        ctx.fillStyle = '#E040FB';
        ctx.beginPath();
        ctx.arc(this.x, this.y - 20, 5, 0, Math.PI * 2);
        ctx.fill();
        
        // 等级
        ctx.fillStyle = '#FFF';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Lv' + this.level, this.x, this.y + 30);
      }
    }
    
    class CannonTower extends Tower {
      constructor(x, y) {
        super({
          id: 'cannon_tower',
          name: '炮塔',
          cost: 200,
          damage: 50,
          range: 100,
          rate: 0.5,
          color: '#FF5722',
        }, x, y);
        this.particles = [];
      }
      
      findTarget(enemies) {
        let toughest = null;
        let maxHealth = 0;
        
        for (const enemy of enemies) {
          if (!enemy.isAlive) continue;
          
          const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
          if (dist <= this.getStats().range && enemy.maxHealth > maxHealth) {
            maxHealth = enemy.maxHealth;
            toughest = enemy;
          }
        }
        
        return toughest;
      }
      
      attack(target) {
        target.takeDamage(this.getStats().damage);
        this.particles.push(new Particle(target.x, target.y, '#FF5722'));
        
        for (const enemy of game.enemies) {
          if (!enemy.isAlive || enemy === target) continue;
          
          const dist = Math.hypot(enemy.x - target.x, enemy.y - target.y);
          if (dist < 60) {
            enemy.takeDamage(this.getStats().damage * 0.3);
            this.particles.push(new Particle(enemy.x, enemy.y, '#FF9800'));
          }
        }
      }
      
      update(deltaTime, enemies) {
        super.update(deltaTime, enemies);
        
        const activeParticles = [];
        for (const particle of this.particles) {
          particle.update(deltaTime);
          if (particle.life > 0) {
            activeParticles.push(particle);
          }
        }
        this.particles = activeParticles;
      }
      
      draw(ctx) {
        const stats = this.getStats();
        
        // 底座
        ctx.fillStyle = this.config.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 28, 0, Math.PI * 2);
        ctx.fill();
        
        // 炮管
        ctx.fillStyle = '#424242';
        ctx.fillRect(this.x - 28, this.y - 6, 40, 12);
        
        // 炮口
        ctx.fillStyle = '#212121';
        ctx.beginPath();
        ctx.arc(this.x - 28, this.y, 8, 0, Math.PI * 2);
        ctx.fill();
        
        // 等级
        ctx.fillStyle = '#FFF';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Lv' + this.level, this.x, this.y + 38);
        
        // 粒子
        for (const particle of this.particles) {
          particle.draw(ctx);
        }
      }
    }
    
    // 子弹类
    class Bullet {
      constructor(startX, startY, targetX, targetY, damage, color) {
        this.x = startX;
        this.y = startY;
        this.damage = damage;
        this.color = color;
        
        const dx = targetX - startX;
        const dy = targetY - startY;
        const dist = Math.hypot(dx, dy);
        
        this.vx = (dx / dist) * 500;
        this.vy = (dy / dist) * 500;
        this.isActive = true;
      }
      
      update(deltaTime, enemies) {
        this.x += this.vx * deltaTime;
        this.y += this.vy * deltaTime;
        
        for (const enemy of enemies) {
          if (!enemy.isAlive) continue;
          
          const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
          if (dist < 15) {
            enemy.takeDamage(this.damage);
            this.isActive = false;
            return true;
          }
        }
        
        return false;
      }
      
      draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // 粒子类
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 200 + 100;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1;
      }
      
      update(deltaTime) {
        this.x += this.vx * deltaTime;
        this.y += this.vy * deltaTime;
        this.vy += 500 * deltaTime;
        this.life -= deltaTime * 2;
      }
      
      draw(ctx) {
        const alpha = Math.max(0, this.life);
        ctx.fillStyle = `rgba(255, 87, 34, ${alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    // ==================== 路径系统 ====================
    class PathSystem {
      constructor() {
        this.waypoints = [
          { x: 0, y: 300 },
          { x: 200, y: 300 },
          { x: 200, y: 100 },
          { x: 400, y: 100 },
          { x: 400, y: 300 },
          { x: 600, y: 300 },
          { x: 600, y: 100 },
          { x: 800, y: 100 },
          { x: 800, y: 300 },
          { x: 1000, y: 300 },
        ];
      }
      
      getWaypoints() {
        return this.waypoints;
      }
      
      draw(ctx) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        
        const start = this.waypoints[0];
        ctx.moveTo(start.x, start.y);
        
        for (let i = 1; i < this.waypoints.length; i++) {
          const point = this.waypoints[i];
          ctx.lineTo(point.x, point.y);
        }
        
        ctx.stroke();
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        for (const point of this.waypoints) {
          ctx.beginPath();
          ctx.arc(point.x, point.y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    
    // ==================== 波次管理器 ====================
    class WaveManager {
      constructor() {
        this.waves = [
          { waveNumber: 1, enemies: [{ type: 'basic', count: 5 }], delay: 800, interval: 5000 },
          { waveNumber: 2, enemies: [{ type: 'basic', count: 10 }], delay: 700, interval: 5000 },
          { waveNumber: 3, enemies: [{ type: 'basic', count: 8 }, { type: 'fast', count: 4 }], delay: 600, interval: 5000 },
          { waveNumber: 4, enemies: [{ type: 'basic', count: 12 }, { type: 'fast', count: 6 }], delay: 500, interval: 5000 },
          { waveNumber: 5, enemies: [{ type: 'basic', count: 10 }, { type: 'tank', count: 2 }], delay: 700, interval: 5000 },
          { waveNumber: 6, enemies: [{ type: 'basic', count: 15 }, { type: 'fast', count: 8 }, { type: 'tank', count: 3 }], delay: 500, interval: 5000 },
          { waveNumber: 7, enemies: [{ type: 'basic', count: 12 }, { type: 'fast', count: 6 }, { type: 'flyer', count: 4 }], delay: 600, interval: 5000 },
          { waveNumber: 8, enemies: [{ type: 'basic', count: 20 }, { type: 'fast', count: 10 }, { type: 'tank', count: 5 }], delay: 400, interval: 5000 },
          { waveNumber: 9, enemies: [{ type: 'basic', count: 15 }, { type: 'fast', count: 8 }, { type: 'tank', count: 4 }, { type: 'flyer', count: 6 }], delay: 500, interval: 5000 },
          { waveNumber: 10, enemies: [{ type: 'basic', count: 30 }, { type: 'fast', count: 15 }, { type: 'tank', count: 8 }, { type: 'flyer', count: 10 }], delay: 300, interval: 5000 },
        ];
        this.currentWaveIndex = -1;
        this.currentWave = null;
        this.enemiesSpawned = 0;
        this.spawnTimer = 0;
        this.waveTimer = 0;
      }
      
      startNextWave() {
        if (this.currentWaveIndex >= this.waves.length - 1) {
          return false;
        }
        
        this.currentWaveIndex++;
        this.currentWave = this.waves[this.currentWaveIndex];
        this.enemiesSpawned = 0;
        this.spawnTimer = 0;
        return true;
      }
      
      update(deltaTime) {
        if (!this.currentWave) return null;
        
        this.spawnTimer -= deltaTime * 1000;
        
        if (this.spawnTimer <= 0 && this.enemiesSpawned < this.getTotalEnemies()) {
          const enemyToSpawn = this.getEnemyToSpawn();
          if (enemyToSpawn) {
            this.spawnTimer = this.currentWave.delay;
            return enemyToSpawn;
          }
        }
        
        return null;
      }
      
      getEnemyToSpawn() {
        let totalSpawned = 0;
        
        for (const enemy of this.currentWave.enemies) {
          if (this.enemiesSpawned < totalSpawned + enemy.count) {
            return { type: enemy.type, count: 1 };
          }
          totalSpawned += enemy.count;
        }
        
        this.currentWave = null;
        if (this.currentWaveIndex < this.waves.length - 1) {
          this.waveTimer = this.waves[this.currentWaveIndex + 1].interval;
        }
        return null;
      }
      
      getTotalEnemies() {
        return this.currentWave.enemies.reduce((sum, e) => sum + e.count, 0);
      }
      
      getCurrentWaveIndex() {
        return this.currentWaveIndex;
      }
      
      getTotalWaves() {
        return this.waves.length;
      }
      
      isAllWavesComplete() {
        return this.currentWaveIndex >= this.waves.length - 1 && !this.currentWave;
      }
      
      getEnemyConfig(type) {
        const configs = {
          basic: { id: 'basic_enemy', name: '基础敌人', health: 50, speed: 1, goldReward: 5, color: '#FF6B6B', size: 20, canFly: false },
          fast: { id: 'fast_enemy', name: '快速敌人', health: 30, speed: 2.5, goldReward: 8, color: '#FFA500', size: 18, canFly: false },
          tank: { id: 'tank_enemy', name: '坦克敌人', health: 200, speed: 0.5, goldReward: 15, color: '#8B4513', size: 30, canFly: false },
          flyer: { id: 'flyer_enemy', name: '飞行敌人', health: 80, speed: 1.5, goldReward: 12, color: '#4169E1', size: 22, canFly: true },
        };
        return configs[type] || configs.basic;
      }
    }
    
    // ==================== 游戏类 ====================
    class Game {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.width = canvas.width;
        this.height = canvas.height;
        
        this.pathSystem = new PathSystem();
        this.waveManager = new WaveManager();
        this.towers = [];
        this.enemies = [];
        this.gold = 200;
        this.lives = 20;
        this.gameState = 'menu';
        
        this.lastTime = 0;
        this.selectedTowerType = null;
        this.hoveredTile = null;
        
        this.setupEventListeners();
      }
      
      setupEventListeners() {
        this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
        this.canvas.addEventListener('mousemove', (e) => this.handleCanvasMove(e));
        window.addEventListener('resize', () => this.resizeCanvas());
        document.addEventListener('keydown', (e) => this.handleKeyDown(e));
      }
      
      handleCanvasClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.width / rect.width);
        const y = (e.clientY - rect.top) * (this.height / rect.height);
        
        if (this.gameState === 'menu') {
          // 检查开始按钮
          if (x >= this.width / 2 - 150 && x <= this.width / 2 + 150 &&
              y >= this.height / 2 - 20 && y <= this.height / 2 + 40) {
            this.start();
          }
          return;
        }
        
        if (this.gameState === 'gameover' || this.gameState === 'victory') {
          if (x >= this.width / 2 - 100 && x <= this.width / 2 + 100 &&
              y >= this.height / 2 + 60 && y <= this.height / 2 + 110) {
            this.restart();
          }
          return;
        }
        
        if (this.gameState !== 'playing') return;
        
        if (this.isOnPath(x, y)) return;
        
        for (const tower of this.towers) {
          const dist = Math.hypot(tower.x - x, tower.y - y);
          if (dist < 30) {
            return;
          }
        }
        
        if (this.selectedTowerType) {
          const cost = this.getTowerCost(this.selectedTowerType);
          if (this.gold >= cost) {
            this.placeTower(this.selectedTowerType, x, y);
            this.gold -= cost;
            this.selectedTowerType = null;
          }
        }
      }
      
      handleCanvasMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (this.width / rect.width);
        const y = (e.clientY - rect.top) * (this.height / rect.height);
        
        this.hoveredTile = { x, y };
        
        // 检查悬停在哪个塔按钮上
        if (this.gameState === 'playing' && x > this.width - 250) {
          if (y > 20 && y < 44) {
            if (x > this.width - 250 && x < this.width - 195 && this.gold >= 100) {
              this.selectedTowerType = 'arrow';
            } else if (x > this.width - 195 && x < this.width - 140 && this.gold >= 150) {
              this.selectedTowerType = 'magic';
            } else if (x > this.width - 140 && x < this.width - 85 && this.gold >= 200) {
              this.selectedTowerType = 'cannon';
            } else {
              this.selectedTowerType = null;
            }
          } else {
            this.selectedTowerType = null;
          }
        } else {
          this.selectedTowerType = null;
        }
      }
      
      handleKeyDown(e) {
        if (e.code === 'Space') {
          if (this.gameState === 'playing') {
            this.gameState = 'paused';
          } else if (this.gameState === 'paused') {
            this.gameState = 'playing';
          }
        } else if (e.key === 'r' || e.key === 'R') {
          this.restart();
        }
      }
      
      resizeCanvas() {
        const rect = this.canvas.getBoundingClientRect();
        this.width = rect.width;
        this.height = rect.height;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
      }
      
      start() {
        this.gameState = 'playing';
        this.waveManager.startNextWave();
      }
      
      restart() {
        this.towers = [];
        this.enemies = [];
        this.gold = 200;
        this.lives = 20;
        this.gameState = 'menu';
        this.waveManager = new WaveManager();
      }
      
      placeTower(type, x, y) {
        let tower;
        
        switch (type) {
          case 'arrow':
            tower = new ArrowTower(x, y);
            break;
          case 'magic':
            tower = new MagicTower(x, y);
            break;
          case 'cannon':
            tower = new CannonTower(x, y);
            break;
          default:
            return;
        }
        
        this.towers.push(tower);
      }
      
      getTowerCost(type) {
        const costs = { arrow: 100, magic: 150, cannon: 200 };
        return costs[type] || 100;
      }
      
      isOnPath(x, y) {
        const waypoints = this.pathSystem.getWaypoints();
        
        for (let i = 0; i < waypoints.length - 1; i++) {
          const p1 = waypoints[i];
          const p2 = waypoints[i + 1];
          
          const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
          const dx = x - p1.x;
          const dy = y - p1.y;
          
          const dot = ((p2.x - p1.x) * dx + (p2.y - p1.y) * dy) / (dist * dist);
          if (dot < 0 || dot > 1) continue;
          
          const closestX = p1.x + (p2.x - p1.x) * dot;
          const closestY = p1.y + (p2.y - p1.y) * dot;
          
          const distance = Math.hypot(x - closestX, y - closestY);
          if (distance < 30) {
            return true;
          }
        }
        
        return false;
      }
      
      spawnEnemy(type) {
        const path = this.pathSystem.getWaypoints();
        const config = this.waveManager.getEnemyConfig(type);
        const enemy = new Enemy(config, path[0].x, path[0].y);
        this.enemies.push(enemy);
      }
      
      update() {
        const now = performance.now();
        const deltaTime = (now - this.lastTime) / 1000;
        this.lastTime = now;
        
        if (this.gameState !== 'playing') return;
        
        const spawn = this.waveManager.update(deltaTime);
        if (spawn) {
          this.spawnEnemy(spawn.type);
        }
        
        for (const tower of this.towers) {
          tower.update(deltaTime, this.enemies);
        }
        
        for (const enemy of this.enemies) {
          if (!enemy.isAlive) {
            this.gold += enemy.goldReward;
            continue;
          }
          
          if (enemy.reachedEnd) {
            this.lives--;
            if (this.lives <= 0) {
              this.gameState = 'gameover';
            }
            continue;
          }
          
          enemy.update(this.pathSystem);
        }
        
        this.enemies = this.enemies.filter(e => e.isAlive && !e.reachedEnd);
      }
      
      draw() {
        const ctx = this.ctx;
        
        ctx.fillStyle = '#2C3E50';
        ctx.fillRect(0, 0, this.width, this.height);
        
        this.pathSystem.draw(ctx);
        
        for (const enemy of this.enemies) {
          enemy.draw(ctx);
        }
        
        for (const tower of this.towers) {
          tower.draw(ctx);
        }
        
        // 顶部状态栏
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, this.width, 60);
        
        ctx.fillStyle = '#FF4444';
        ctx.font = '18px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText('❤️ 生命: ' + this.lives, 20, 20);
        
        ctx.fillStyle = '#FFD700';
        ctx.fillText('💰 金币: ' + this.gold, 200, 20);
        
        const wave = this.waveManager.getCurrentWaveIndex() + 1;
        const total = this.waveManager.getTotalWaves();
        ctx.fillStyle = '#4FC3F7';
        ctx.textAlign = 'center';
        ctx.fillText('波次: ' + wave + ' / ' + total, this.width / 2, 20);
        
        // 塔选择面板
        ctx.fillStyle = 'rgba(40, 40, 40, 0.8)';
        ctx.beginPath();
        ctx.roundRect(this.width - 250, 20, 230, 40, 5);
        ctx.fill();
        
        ctx.fillStyle = this.gold >= 100 ? '#4CAF50' : '#555';
        ctx.fillRect(this.width - 250, 28, 55, 24);
        ctx.fillStyle = '#FFF';
        ctx.font = '12px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText('箭塔', this.width - 245, 40);
        ctx.textAlign = 'right';
        ctx.fillText('100', this.width - 200, 40);
        
        ctx.fillStyle = this.gold >= 150 ? '#9C27B0' : '#555';
        ctx.fillRect(this.width - 195, 28, 55, 24);
        ctx.fillStyle = '#FFF';
        ctx.fillText('魔法', this.width - 190, 40);
        ctx.textAlign = 'right';
        ctx.fillText('150', this.width - 145, 40);
        
        ctx.fillStyle = this.gold >= 200 ? '#FF5722' : '#555';
        ctx.fillRect(this.width - 140, 28, 55, 24);
        ctx.fillStyle = '#FFF';
        ctx.fillText('炮塔', this.width - 135, 40);
        ctx.textAlign = 'right';
        ctx.fillText('200', this.width - 90, 40);
        
        // 暂停提示
        if (this.gameState === 'paused') {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
          ctx.fillRect(0, 0, this.width, this.height);
          ctx.fillStyle = '#FFF';
          ctx.font = '32px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('游戏暂停', this.width / 2, this.height / 2);
          ctx.font = '18px Arial';
          ctx.fillStyle = '#AAA';
          ctx.fillText('按空格键继续', this.width / 2, this.height / 2 + 40);
        }
        
        // 菜单
        if (this.gameState === 'menu') {
          this.drawMenu();
        }
        
        // 游戏结束
        if (this.gameState === 'gameover') {
          this.drawGameOver();
        }
        
        // 胜利
        if (this.gameState === 'victory') {
          this.drawVictory();
        }
      }
      
      drawMenu() {
        const ctx = this.ctx;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, this.width, this.height);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 64px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('塔防游戏', this.width / 2, this.height / 2 - 150);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('Tower Defense Game', this.width / 2, this.height / 2 - 100);
        
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(this.width / 2 - 150, this.height / 2 - 20, 300, 40);
        ctx.fillStyle = '#FFF';
        ctx.font = '20px Arial';
        ctx.fillText('开始游戏', this.width / 2, this.height / 2);
        
        ctx.fillStyle = '#AAA';
        ctx.font = '18px Arial';
        ctx.fillText('放置防御塔，阻止敌人入侵城堡！', this.width / 2, this.height / 2 + 30);
        ctx.fillText('完成所有波次即可胜利！', this.width / 2, this.height / 2 + 55);
        
        ctx.fillStyle = '#888';
        ctx.font = '16px Arial';
        ctx.fillText('点击地图放置防御塔', this.width / 2, this.height / 2 + 90);
        ctx.fillText('箭塔(100金)、魔法塔(150金)、炮塔(200金)', this.width / 2, this.height / 2 + 110);
      }
      
      drawGameOver() {
        const ctx = this.ctx;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, this.width, this.height);
        
        ctx.fillStyle = '#FF4444';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('游戏结束', this.width / 2, this.height / 2 - 30);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('到达波次: ' + (this.waveManager.getCurrentWaveIndex() + 1), this.width / 2, this.height / 2);
        ctx.fillText('最终金币: ' + this.gold, this.width / 2, this.height / 2 + 25);
        
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(this.width / 2 - 100, this.height / 2 + 60, 200, 40);
        ctx.fillStyle = '#FFF';
        ctx.font = '20px Arial';
        ctx.fillText('重新开始', this.width / 2, this.height / 2 + 80);
      }
      
      drawVictory() {
        const ctx = this.ctx;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, this.width, this.height);
        
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 48px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('胜利！', this.width / 2, this.height / 2 - 30);
        
        ctx.fillStyle = '#FFF';
        ctx.font = '24px Arial';
        ctx.fillText('最终金币: ' + this.gold, this.width / 2, this.height / 2);
        
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(this.width / 2 - 100, this.height / 2 + 60, 200, 40);
        ctx.fillStyle = '#FFF';
        ctx.font = '20px Arial';
        ctx.fillText('重新开始', this.width / 2, this.height / 2 + 80);
      }
      
      loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
      }
    }
    
    // ==================== 启动游戏 ====================
    const canvas = document.getElementById('gameCanvas');
    const game = new Game(canvas);
    game.loop();
  </script>
</body>
</html>
